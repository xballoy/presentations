name: Deploy pages

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: write

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: pnpm install

      - name: Build presentations
        env:
          BASE: /${{ github.event.repository.name }}
        run: |
          pnpm --filter ai-tech-debt exec slidev build slides-en.md --without-notes --base "$BASE/ai-tech-debt/en/" --out ../dist/ai-tech-debt/en
          pnpm --filter ai-tech-debt exec slidev build slides-fr.md --without-notes --base "$BASE/ai-tech-debt/fr/" --out ../dist/ai-tech-debt/fr
          pnpm --filter solid        exec slidev build slides-en.md --without-notes --base "$BASE/solid/en/"        --out ../dist/solid/en
          pnpm --filter solid        exec slidev build slides-fr.md --without-notes --base "$BASE/solid/fr/"        --out ../dist/solid/fr
          pnpm --filter opaque-types exec slidev build slides-en.md --without-notes --base "$BASE/opaque-types/en/" --out ../dist/opaque-types/en
          pnpm --filter opaque-types exec slidev build slides-fr.md --without-notes --base "$BASE/opaque-types/fr/" --out ../dist/opaque-types/fr
          cp index.html dist/index.html
          cp shared/redirect.html dist/ai-tech-debt/index.html
          cp shared/redirect.html dist/solid/index.html
          cp shared/redirect.html dist/opaque-types/index.html

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-24.04
    name: Deploy
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
